#? Config file for btop v.1.4.6

color_theme = "TTY"

# Use the terminal background.
theme_background = true
truecolor = true
force_tty = false
rounded_corners = true

terminal_sync = true

shown_boxes = "cpu mem net proc"

# Use default box placement.
proc_left = false
cpu_bottom = false
mem_below_net = false

#* Define presets for the layout of the boxes. Preset 0 is always all boxes shown with default settings. Max 9 presets.
#* Format: "box_name:P:G,box_name:P:G" P=(0 or 1) for alternate positions, G=graph symbol to use for box.
#* Use whitespace " " as separator between different presets.
#* Example: "cpu:0:default,mem:0:tty,proc:1:default cpu:0:braille,proc:0:tty"
presets = "cpu:1:default,proc:0:default cpu:0:default,mem:0:default,net:0:default cpu:0:block,net:0:tty"

vim_keys = false

graph_symbol = "braille"
graph_symbol_cpu = "default"
graph_symbol_gpu = "default"
graph_symbol_mem = "default"
graph_symbol_net = "default"
graph_symbol_proc = "default"

# "Recommended 2000 ms or above for better sample times for graphs."
update_ms = 2000

proc_sorting = "cpu direct"
proc_reversed = false

proc_tree = false
proc_aggregate = false

proc_colors = true
proc_gradient = true
proc_per_core = false
proc_mem_bytes = true
proc_cpu_graphs = true
# "very slow but more accurate"
proc_info_smaps = false
proc_filter_kernel = false
keep_dead_proc_usage = false

cpu_graph_upper = "Auto"
cpu_graph_lower = "Auto"
cpu_single_graph = false
cpu_invert_lower = true

show_gpu_info = "Auto"

show_uptime = true

show_cpu_watts = true

check_temp = true
cpu_sensor = "Auto"
show_coretemp = true
cpu_core_map = ""
temp_scale = "celsius"

base_10_sizes = false

show_cpu_freq = true
freq_mode = "first"

clock_format = "%X"

#* Update main ui in background when menus are showing, set this to false if the menus is flickering too much for comfort.
background_update = true

custom_cpu_name = ""

disks_filter = ""

mem_graphs = true


show_swap = true
# Count swap as disk.
swap_disk = true

show_disks = true
only_physical = true
use_fstab = true


zfs_arc_cached = true
zfs_hide_datasets = false

#* Set to true to show available disk space for privileged users.
disk_free_priv = false

#* Toggles if io activity % (disk busy time) should be shown in regular disk usage view.
show_io_stat = true

#* Toggles io mode for disks, showing big graphs for disk read/write speeds.
io_mode = false

#* Set to True to show combined read/write io graphs in io mode.
io_graph_combined = false

#* Set the top speed for the io graphs in MiB/s (100 by default), use format "mountpoint:speed" separate disks with whitespace " ".
#* Example: "/mnt/media:100 /:20 /boot:1".
io_graph_speeds = ""

# Auto scale the net graph.
net_auto = true
net_sync = true

# Only used if net_auto is false.
net_download = 100 # Mebibits
net_upload = 100 # Mebibits

net_iface = ""

# "Auto" uses base_10_sizes.
base_10_bitrate = "Auto"

show_battery = true
selected_battery = "Auto"
show_battery_watts = true

log_level = "WARNING"

save_config_on_exit = true

nvml_measure_pcie_speeds = true
rsmi_measure_pcie_speeds = true

gpu_mirror_graph = true

shown_gpus = "nvidia amd intel"

custom_gpu_name0 = ""
custom_gpu_name1 = ""
custom_gpu_name2 = ""
custom_gpu_name3 = ""
custom_gpu_name4 = ""
custom_gpu_name5 = ""
